name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0-beta.1)

permissions:
  contents: write

jobs:
  release:
    name: Build and Release for Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Build Rust App Release
      run: cargo build --release

    - name: Move and Rename Executables for Release
      run: |
        Move-Item "target\release\jazasort.exe" "JazaSort-Portable.exe"

    - name: Create ZIP Archive for Portable Version
      run: Compress-Archive -Path "JazaSort-Portable.exe" -DestinationPath "JazaSort-Windows.zip"

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: |
          JazaSort-Portable.exe
          JazaSort-Windows.zip
        draft: false
        prerelease: contains(github.ref, 'beta') || contains(github.ref, 'alpha')
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
