name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0-beta.1)

# Permissions needed to create a GitHub Release
permissions:
  contents: write

jobs:
  release:
    name: Build and Release for Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install NSIS
      run: |
        choco install nsis -y
        Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build Application (Portable & Installer)
      run: wails build -nsis -clean

    - name: Move and Rename Executables for Release
      run: |
        Move-Item "build\bin\jazasort.exe" "JazaSort-Portable.exe"
        Move-Item "build\bin\*-installer.exe" "JazaSort-Installer.exe"

    - name: Create ZIP Archive for Portable Version
      run: Compress-Archive -Path "JazaSort-Portable.exe" -DestinationPath "JazaSort-Windows.zip"

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: |
          JazaSort-Portable.exe
          JazaSort-Installer.exe
          JazaSort-Windows.zip
        draft: false
        prerelease: contains(github.ref, 'beta') || contains(github.ref, 'alpha')
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
