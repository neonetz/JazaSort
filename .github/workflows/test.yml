name: Test & Build

on:
  push:
    branches: [ "main", "ref/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Frontend Tests & Build
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
        npm run test:run

    - name: Backend Tests
      run: cargo test --verbose
